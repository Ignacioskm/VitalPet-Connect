server:
  port: 8086

spring:
  application:
    name: ms-staff
  datasource:
    url: jdbc:mysql://localhost:3311/vitalpet_staff?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    defer-datasource-initialization: true # Esto hace que hibernate espere creer las tablas pa meter los datos.
  sql:
    init:
      mode: always #Obligamos a buscar el archivo sql

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

#Rutas swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs