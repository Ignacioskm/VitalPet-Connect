server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**

        - id: ms-users
          uri: lb://ms-users
          predicates:
            - Path=/api/users/**

        - id: ms-pets
          uri: lb://ms-pets
          predicates:
            - Path=/api/pets/**

        - id: ms-clinical-history
          uri: lb://ms-clinical-history
          predicates:
            - Path=/api/clinical/**

        - id: ms-appointments
          uri: lb://ms-appointments
          predicates:
            - Path=/api/appointments/**

        - id: ms-staff
          uri: lb://ms-staff
          predicates:
            - Path=/api/staff/**

        - id: ms-payments
          uri: lb://ms-payments
          predicates:
            - Path=/api/payments/**

        - id: ms-adoptions
          uri: lb://ms-adoptions
          predicates:
            - Path=/api/adoptions/**

        - id: ms-notifications
          uri: lb://ms-notifications
          predicates:
            - Path=/api/notifications/**

        - id: ms-branches
          uri: lb://ms-branches
          predicates:
            - Path=/api/branches/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
